<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مکتب فاطمة للبنات - ٹیسٹ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Nastaliq Urdu', serif; direction: rtl; text-align: right; padding: 15px; background: #f8f9fa; }
    .report { border: 6px solid #006400; padding: 20px; max-width: 210mm; margin: 0 auto; background: white; min-height: 280mm; position: relative; }
    .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-35deg); font-size: 4rem; color: rgba(0,100,0,0.1); pointer-events: none; }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; }
    th, td { border: 1px solid #aaa; padding: 8px; text-align: center; }
    th { background: #006400; color: white; }
    .btn { padding: 10px 20px; background: #006400; color: white; border: none; border-radius: 6px; margin: 8px; cursor: pointer; }
    .info { margin: 12px 0; font-size: 1.1rem; }
  </style>
</head>
<body>

<h2 style="color:#006400; text-align:center;">ٹیسٹ رپورٹ کارڈ</h2>

<div style="margin-bottom:20px;">
  <input id="sname" placeholder="طالبہ کا نام" style="width:80%; padding:10px; font-size:1.1rem;">
  <br><br>
  <button class="btn" onclick="fillPreview()">پیش نظارہ دکھائیں</button>
</div>

<div class="report">
  <div class="watermark">مکتب فاطمة للبنات</div>
  
  <h1 style="color:#006400; text-align:center; margin:0;">مکتب فاطمة للبنات</h1>
  <p style="text-align:center; margin:4px 0;">اندر قلعہ، مقابل مسجد نمرہ، کھمم، تلنگانہ</p>
  
  <div class="info"><strong>نام طالبہ :</strong> <span id="pname">-</span></div>
  
  <table>
    <thead>
      <tr>
        <th>مضمون</th>
        <th>کل</th>
        <th>حاصل</th>
      </tr>
    </thead>
    <tbody id="ptbody">
      <!-- will be filled by JS -->
    </tbody>
    <tfoot>
      <tr style="font-weight:bold;">
        <td>کل</td>
        <td>300</td>
        <td id="ptotal">0</td>
      </tr>
    </tfoot>
  </table>
  
  <div style="margin-top:20px; font-size:1.3rem; text-align:center;">
    فیصد: <span id="pperc">0.0</span>%  
    <br>گریڈ: <span id="pgrade">F</span>
  </div>
</div>

<script>
function fillPreview() {
  const name = document.getElementById("sname").value.trim() || "طالبہ ٹیسٹ";
  document.getElementById("pname").textContent = name;
  
  const subjects = [
    "ناظرہ قرآن", "عقائد", "مسنون دعائیں", "اردو"
  ];
  
  let html = "";
  subjects.forEach(sub => {
    html += `<tr><td>${sub}</td><td>100</td><td>75</td></tr>`;
  });
  
  document.getElementById("ptbody").innerHTML = html;
  document.getElementById("ptotal").textContent = "300";
  document.getElementById("pperc").textContent = "75.0";
  document.getElementById("pgrade").textContent = "A";
  
  alert("پیش نظارہ اپ ڈیٹ ہو گیا — نیچے دیکھیں");
}
</script>

</body>
</html>
