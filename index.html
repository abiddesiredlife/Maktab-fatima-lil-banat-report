<!DOCTYPE html>
<html lang="ur" dir="rtl">

<head>

<meta charset="UTF-8">
<title>Maktab Fatima Report Card</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family: "Noto Nastaliq Urdu", serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

/* ADMIN PANEL */

.admin{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:6px;
}

input,select{
padding:6px;
margin:5px;
}

/* REPORT PAGE */

.report{
width:794px;
height:1123px;
background:white;
margin:auto;
padding:40px;
box-sizing:border-box;
border:6px solid #b58a2c;
position:relative;
overflow:hidden;
}

/* LOGO */

.logo{
position:absolute;
left:40px;
top:40px;
width:120px;
}

/* TITLE */

.title{
text-align:center;
font-size:38px;
font-weight:bold;
margin-top:10px;
}

.subtitle{
text-align:center;
margin-bottom:20px;
}

/* WATERMARK */

.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-30deg);
font-size:110px;
opacity:0.05;
pointer-events:none;
}

/* THEMES */

.green{color:#1c5e2e}
.gold{color:#b58a2c}
.blue{color:#203a8f}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
page-break-inside:avoid;
}

th,td{
border:1px solid #444;
padding:8px;
text-align:center;
}

th{
background:#1c5e2e;
color:white;
}

.report *{
page-break-inside:avoid;
}

/* FOOTER */

.footer{
margin-top:40px;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<!-- ADMIN PANEL -->

<div class="admin">

نام طالبہ
<input id="name">

کلاس
<select id="class" onchange="changeSubjects()">

<option value="nazira">شعبہ ناظرہ قرآن</option>
<option value="momina2">مومنہ کورس دوم</option>
<option value="momina3">مومنہ کورس سوم</option>

</select>

<div id="marks"></div>

<br>

<button onclick="generate()">رپورٹ بنائیں</button>
<button onclick="downloadPDF()">PDF ڈاؤنلوڈ</button>

</div>


<!-- REPORT CARD -->

<div id="report" class="report">

<div class="watermark">مکتب فاطمہ</div>

<img src="logo.png" class="logo">

<div id="title" class="title gold">

مَكْتَبُ فَاطِمَةَ لِلْبَنَاتِ

</div>

<div class="subtitle">

اندر قلعہ، مقابل مسجد نمرہ، کھمم، تلنگانہ

</div>

<div>

نام طالبہ :
<span id="rname"></span>

</div>

<br>

<table id="reportTable">

<tr>
<th>مضمون</th>
<th>کل نمبر</th>
<th>حاصل کردہ نمبر</th>
</tr>

</table>

<br>

کل نمبر :
<span id="total"></span>

<br>

فیصد :
<span id="percent"></span>

<br>

گریڈ :
<span id="grade"></span>

<br>

نتیجہ :
<span id="result"></span>

<div class="footer">

<div>ناظمہ مکتب</div>

<div>صدر مدرس</div>

</div>

</div>


<script>

/* SUBJECT STRUCTURE */

let subjects={

nazira:[
["ناظرہ قرآن",100],
["عقائد",50],
["مسنون دعائیں",50],
["اردو",100]
],

momina2:[

["ناظرہ قرآن",100],
["حفظ سورہ",100],
["حفظ حدیث",100],
["دعائیں",100],
["عقائد",10],
["اردو تقریری",50],
["عقائد اسلام",90],
["مسائل شرعی",100],
["سیرت النبی ﷺ",100],
["اخلاقی تعلیم",100],
["عربی زبان",100],
["اردو تحریری",50]

],

momina3:[

["ناظرہ قرآن",100],
["حفظ سورہ",100],
["حفظ حدیث",100],
["دعائیں",100],
["عقائد",10],
["اردو تقریری",50],
["عقائد اسلام",90],
["مسائل شرعی",100],
["سیرت النبی ﷺ",100],
["اخلاقی تعلیم",100],
["عربی زبان",100],
["اردو تحریری",50]

]

}


/* CHANGE SUBJECT INPUTS */

function changeSubjects(){

let cls=document.getElementById("class").value
let div=document.getElementById("marks")

div.innerHTML=""

subjects[cls].forEach((s,i)=>{

div.innerHTML+=s[0]+
` <input id="m${i}" type="number"> <br>`

})

}

changeSubjects()


/* GENERATE REPORT */

function generate(){

let cls=document.getElementById("class").value
let name=document.getElementById("name").value

document.getElementById("rname").innerText=name

let table=document.getElementById("reportTable")

table.innerHTML=`
<tr>
<th>مضمون</th>
<th>کل نمبر</th>
<th>حاصل کردہ نمبر</th>
</tr>
`

let total=0
let max=0

subjects[cls].forEach((s,i)=>{

let m=Number(document.getElementById("m"+i).value)

total+=m
max+=s[1]

table.innerHTML+=`
<tr>
<td>${s[0]}</td>
<td>${s[1]}</td>
<td>${m}</td>
</tr>
`

})

let percent=(total/max)*100

let grade="F"

if(percent>=90)grade="A+"
else if(percent>=75)grade="A"
else if(percent>=60)grade="B"
else if(percent>=35)grade="C"

document.getElementById("total").innerText=total
document.getElementById("percent").innerText=percent.toFixed(1)+"%"
document.getElementById("grade").innerText=grade
document.getElementById("result").innerText=(percent>=35?"پاس":"فیل")

let title=document.getElementById("title")

title.className="title"

if(cls=="nazira")title.classList.add("green")
if(cls=="momina2")title.classList.add("gold")
if(cls=="momina3")title.classList.add("blue")

}


/* PDF EXPORT */

function downloadPDF(){

let element=document.getElementById("report")

let opt={
margin:0,
filename:'report-card.pdf',
image:{type:'jpeg',quality:1},
html2canvas:{scale:3,useCORS:true},
jsPDF:{unit:'px',format:[794,1123],orientation:'portrait'}
}

html2pdf().set(opt).from(element).save()

}

</script>

</body>

</html>
