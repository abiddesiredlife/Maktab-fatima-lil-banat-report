<!DOCTYPE html>
<html lang="ur" dir="rtl">

<head>

<meta charset="UTF-8">
<title>Maktab Fatima Report System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:'Noto Nastaliq Urdu',serif;
background:#f5f5f5;
padding:20px;
}

h2{
text-align:center;
}

.admin{
background:white;
padding:20px;
margin-bottom:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
padding:6px;
margin:4px;
}

button{
padding:10px 20px;
margin:10px;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #444;
padding:8px;
text-align:center;
}

.report{
width:210mm;
min-height:297mm;
background:white;
padding:40px;
margin:auto;
position:relative;
}

.logo{
position:absolute;
left:40px;
top:40px;
width:80px;
}

.title{
text-align:center;
font-size:42px;
font-weight:bold;
margin-bottom:10px;
}

.gold{color:#b58a2c}
.green{color:#146c43}
.blue{color:#1f3c88}

.watermark{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
opacity:0.05;
}

.info{
display:flex;
justify-content:space-between;
margin-top:30px;
}

.footer{
margin-top:40px;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<h2>Admin Panel - Student Marks Entry</h2>

<div class="admin">

<select id="studentSelect"></select>

<input placeholder="نام طالبہ" id="name">

<select id="class">
<option value="nazira">شعبہ ناظرہ قرآن</option>
<option value="momina2">مومنہ کورس دوم</option>
<option value="momina3">مومنہ کورس سوم</option>
</select>

<br>

ناظرہ قرآن
<input id="s1">

عقائد
<input id="s2">

مسنون دعائیں
<input id="s3">

اردو
<input id="s4">

<br>

<button onclick="saveStudent()">Save Student</button>
<button onclick="generate()">Generate Report</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="report" class="report">

<div class="watermark">فاطمہ</div>

<img src="logo.png" class="logo">

<div id="title" class="title gold">
مَكْتَبُ فَاطِمَةَ لِلْبَنَاتِ
</div>

<div style="text-align:center">
اندر قلعہ، مقابل مسجد نمرہ، کھمم، تلنگانہ
</div>

<div class="info">

<div>
نام طالبہ:
<span id="rname"></span>
</div>

<div>
کلاس:
<span id="rclass"></span>
</div>

</div>

<table>

<tr>
<th>مضمون</th>
<th>کل نمبر</th>
<th>حاصل کردہ</th>
</tr>

<tr>
<td>ناظرہ قرآن</td>
<td>100</td>
<td id="rs1"></td>
</tr>

<tr>
<td>عقائد</td>
<td>50</td>
<td id="rs2"></td>
</tr>

<tr>
<td>مسنون دعائیں</td>
<td>50</td>
<td id="rs3"></td>
</tr>

<tr>
<td>اردو</td>
<td>100</td>
<td id="rs4"></td>
</tr>

</table>

<br>

کل نمبر: <span id="total"></span>
<br>
فیصد: <span id="percent"></span>
<br>
گریڈ: <span id="grade"></span>
<br>
رینک: <span id="rank"></span>

<div class="footer">

<div>دستخط معلم</div>
<div>دستخط ممتحن</div>

</div>

</div>

<script>

let students=[]

function updateDropdown(){

let select=document.getElementById("studentSelect")
select.innerHTML=""

students.forEach((s,i)=>{
let option=document.createElement("option")
option.value=i
option.text="Student "+(i+1)
select.appendChild(option)
})

}

function saveStudent(){

let student={
name:document.getElementById("name").value,
class:document.getElementById("class").value,
s1:Number(document.getElementById("s1").value),
s2:Number(document.getElementById("s2").value),
s3:Number(document.getElementById("s3").value),
s4:Number(document.getElementById("s4").value)
}

students.push(student)

updateDropdown()

alert("Student Saved")

}

function calculateRanks(){

students.forEach(s=>{
s.total=s.s1+s.s2+s.s3+s.s4
})

students.sort((a,b)=>b.total-a.total)

students.forEach((s,i)=>{

if(i==0)s.rank="اول"
else if(i==1)s.rank="دوم"
else if(i==2)s.rank="سوم"
else s.rank=i+1

})

}

function generate(){

calculateRanks()

let index=document.getElementById("studentSelect").value
let s=students[index]

document.getElementById("rname").innerText=s.name
document.getElementById("rclass").innerText=s.class

document.getElementById("rs1").innerText=s.s1
document.getElementById("rs2").innerText=s.s2
document.getElementById("rs3").innerText=s.s3
document.getElementById("rs4").innerText=s.s4

let total=s.s1+s.s2+s.s3+s.s4
let percent=(total/300)*100

let grade="F"

if(percent>=90)grade="A+"
else if(percent>=75)grade="A"
else if(percent>=60)grade="B"
else if(percent>=35)grade="C"

document.getElementById("total").innerText=total
document.getElementById("percent").innerText=percent.toFixed(1)+"%"
document.getElementById("grade").innerText=grade
document.getElementById("rank").innerText=s.rank

let title=document.getElementById("title")

title.classList.remove("gold","green","blue")

if(s.class=="nazira")title.classList.add("green")
if(s.class=="momina2")title.classList.add("gold")
if(s.class=="momina3")title.classList.add("blue")

}

function downloadPDF(){

let element=document.getElementById("report")

html2pdf()
.from(element)
.set({
margin:0,
filename:"report-card.pdf",
html2canvas:{scale:2},
jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
})
.save()

}

</script>

</body>

</html>
