<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مکتب فاطمة للبنات</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
    margin:0;
    font-family:'Noto Nastaliq Urdu', serif;
    background:#eef2f7;
}

/* ================= ADMIN PANEL ================= */

.admin{
    background:#111827;
    color:white;
    padding:15px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

.admin input,.admin select{
    padding:6px;
}

/* ================= REPORT ================= */

.report{
    width:210mm;
    min-height:297mm;
    background:white;
    margin:20px auto;
    padding:30px;
    border:6px solid #b68d40;
    position:relative;
}

/* Themes */

.gold{border-color:#b68d40;}
.gold th{background:#b68d40;color:white;}

.green{border-color:#166534;}
.green th{background:#166534;color:white;}

.blue{border-color:#0b3c5d;}
.blue th{background:#0b3c5d;color:white;}

.header{
    text-align:center;
}

.logo{
    width:90px;
}

.title{
    font-size:38px;
    color:#b68d40;
    font-weight:bold;
}

.address{
    font-size:14px;
    margin-top:5px;
}

.info{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

.footer{
    margin-top:20px;
    font-weight:bold;
    text-align:center;
}

.sign{
    margin-top:60px;
    display:flex;
    justify-content:space-between;
}

@media print{
    .admin{display:none;}
}
</style>
</head>

<body>

<!-- ADMIN SECTION -->
<div class="admin">
جماعت:
<select id="classSelect">
<option value="nazira">شعبہ ناظرہ قرآن</option>
<option value="momina2">مومنہ کورس دوم سال</option>
<option value="momina3">مومنہ کورس سوم سال</option>
</select>

نام:
<input id="studentName">

سال:
<input id="year" value="2024-2025">

<button onclick="generate()">رپورٹ تیار کریں</button>
<button onclick="downloadPDF()">PDF ڈاؤن لوڈ</button>
</div>

<!-- REPORT -->
<div class="report gold" id="report">

<div class="header">
<img src="logo.png" class="logo"><br>
<div class="title">مکتب فاطمة للبنات</div>
<div class="address">
اندر قلعہ، مقابل مسجد نمرہ، کھمم، تلنگانہ
</div>
</div>

<div class="info">
<div>نام: <span id="rName"></span></div>
<div>تعلیمی سال: <span id="rYear"></span></div>
</div>

<table>
<thead>
<tr>
<th>مضمون</th>
<th>کل نمبر</th>
<th>حاصل کردہ نمبر</th>
</tr>
</thead>
<tbody id="marksBody"></tbody>
</table>

<div class="footer">
کل نمبر: <span id="totalMax"></span> |
حاصل کردہ: <span id="totalObt"></span> |
فیصد: <span id="percentage"></span>% |
گریڈ: <span id="grade"></span> |
نتیجہ: <span id="result"></span>
</div>

<div class="sign">
<div>ناظمہ مکتب</div>
<div>صدر مدرسہ</div>
</div>

</div>

<script>

const subjects={
nazira:[
{name:"ناظرہ قرآن",max:100},
{name:"عقائد",max:50},
{name:"مسنون دعائیں",max:50},
{name:"اردو",max:100}
],
momina2:[
{name:"عقائد اسلام",max:90},
{name:"مسائل شرعی",max:100},
{name:"سیرت النبی ﷺ",max:100},
{name:"اخلاقی تعلیم",max:100},
{name:"عربی زبان",max:100},
{name:"اردو تحریری",max:50}
],
momina3:[
{name:"عقائد اسلام",max:90},
{name:"مسائل شرعی",max:100},
{name:"سیرت النبی ﷺ",max:100},
{name:"اخلاقی تعلیم",max:100},
{name:"عربی زبان",max:100},
{name:"اردو تحریری",max:50}
]
};

function generate(){
let cls=document.getElementById("classSelect").value;
let name=document.getElementById("studentName").value;
let year=document.getElementById("year").value;

document.getElementById("rName").innerText=name;
document.getElementById("rYear").innerText=year;

let body=document.getElementById("marksBody");
body.innerHTML="";

let totalMax=0;
let totalObt=0;

subjects[cls].forEach(sub=>{
let obtained=prompt("داخل کریں نمبر: "+sub.name+" (کل "+sub.max+")");
obtained=parseFloat(obtained)||0;

totalMax+=sub.max;
totalObt+=obtained;

body.innerHTML+=`
<tr>
<td>${sub.name}</td>
<td>${sub.max}</td>
<td>${obtained}</td>
</tr>`;
});

let percent=((totalObt/totalMax)*100).toFixed(2);

let grade="";
if(percent>=90) grade="A+";
else if(percent>=75) grade="A";
else if(percent>=60) grade="B";
else if(percent>=35) grade="C";
else grade="F";

let result=percent>=35?"پاس":"فیل";

document.getElementById("totalMax").innerText=totalMax;
document.getElementById("totalObt").innerText=totalObt;
document.getElementById("percentage").innerText=percent;
document.getElementById("grade").innerText=grade;
document.getElementById("result").innerText=result;

}

function downloadPDF(){
html2pdf().from(document.getElementById("report")).save("ReportCard.pdf");
}

</script>

</body>
</html>
