<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مکتب فاطمة للبنات - رپورٹ کارڈز</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        @page { size: A4 portrait; margin: 8mm; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Nastaliq Urdu', serif;
            background: #f5f5f5;
            padding: 20px;
            direction: rtl;
        }
        .page {
            width: 210mm;
            min-height: 297mm;
            margin: 15px auto;
            padding: 18mm 22mm;
            background: white;
            border: 10px solid var(--theme-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            page-break-after: always;
        }
        .watermark {
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-38deg);
            font-size: 5.2rem;
            color: rgba(0,100,0,0.06);
            font-weight: bold;
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        .header img {
            width: 85px;
            height: 85px;
            object-fit: contain;
            margin-bottom: 8px;
        }
        .header h1 {
            font-family: 'Amiri', serif;
            font-size: 2.85rem;
            color: var(--theme-color);
            margin: 0;
            letter-spacing: 1px;
        }
        .address {
            font-size: 1.05rem;
            color: #333;
            margin: 6px 0 12px;
        }
        .exam {
            font-size: 1.25rem;
            font-weight: bold;
            color: #222;
            margin-bottom: 18px;
        }
        .student-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 18px;
            font-size: 1.08rem;
        }
        .student-info div {
            background: #f9f9f9;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 0.96rem;
        }
        th, td {
            border: 1px solid #444;
            padding: 6px 8px;
            text-align: center;
        }
        th {
            background: var(--theme-color);
            color: white;
            font-weight: 700;
        }
        .total-row {
            font-weight: bold;
            background: #f0f8f0;
        }
        .result {
            display: flex;
            justify-content: space-between;
            margin-top: 22px;
        }
        .result-box {
            width: 48%;
            border: 3px solid var(--theme-color);
            padding: 14px;
            border-radius: 10px;
            text-align: center;
        }
        .signatures {
            margin-top: 65px;
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
        }
        .signature {
            text-align: center;
            width: 45%;
        }
        .signature-line {
            border-top: 2px solid #222;
            width: 85%;
            margin: 12px auto 6px;
        }
        .download-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 32px;
            background: #006400;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,100,0,0.3);
            z-index: 100;
        }
        @media print {
            body { background: white; padding: 0; }
            .page { margin: 0; box-shadow: none; border: 8px solid var(--theme-color); }
            .download-btn { display: none; }
        }
    </style>
</head>
<body>

<button class="download-btn" onclick="downloadAllPDF()">تمام رپورٹ کارڈز پی ڈی ایف میں ڈاؤن لوڈ کریں</button>

<div id="cards-container"></div>

<script>
    // ================== EDIT STUDENTS HERE ==================
    // Add or modify students below. You can add as many as you want.
    const students = [
        {
            name: "خاسم بی",
            parent: "شیخ جانی",
            className: "شعبہ ناظرہ قرآن",
            theme: "#006400",
            subjects: [
                {name: "ناظرہ قرآن", total: 100, obtained: 70},
                {name: "عقائد", total: 50, obtained: 35},
                {name: "مسنون دعائیں", total: 50, obtained: 35},
                {name: "اردو", total: 100, obtained: 60}
            ]
        },
        {
            name: "ایم ڈی حفصہ",
            parent: "ایم ڈی خواجہ خلیل",
            className: "مومنہ کورس دوم سال",
            theme: "#B8860B",
            subjects: [
                {name: "ناظرہ قرآن", total: 100, obtained: 37},
                {name: "حفظ سورہ", total: 100, obtained: 45},
                {name: "حفظ احادیث", total: 100, obtained: 38},
                {name: "مسنون دعائیں", total: 100, obtained: 35},
                {name: "عقائد", total: 10, obtained: 10},
                {name: "اردو تقریری", total: 50, obtained: 23},
                {name: "عقائد اسلام", total: 90, obtained: 40},
                {name: "مسائل شرعی", total: 100, obtained: 49},
                {name: "سیرت النبی ﷺ", total: 100, obtained: 33},
                {name: "اخلاقی تعلیم", total: 100, obtained: 27},
                {name: "عربی زبان", total: 100, obtained: 40},
                {name: "اردو تحریری", total: 50, obtained: 18}
            ]
        },
        {
            name: "فاطمہ بیگم",
            parent: "محمد یوسف",
            className: "مومنہ کورس سوم سال",
            theme: "#001F3F",
            subjects: [
                {name: "ناظرہ قرآن", total: 100, obtained: 92},
                {name: "حفظ سورہ", total: 100, obtained: 88},
                {name: "حفظ احادیث", total: 100, obtained: 95},
                {name: "مسنون دعائیں", total: 100, obtained: 100},
                {name: "عقائد", total: 10, obtained: 10},
                {name: "اردو تقریری", total: 50, obtained: 48},
                {name: "عقائد اسلام", total: 90, obtained: 85},
                {name: "مسائل شرعی", total: 100, obtained: 97},
                {name: "سیرت النبی ﷺ", total: 100, obtained: 100},
                {name: "اخلاقی تعلیم", total: 100, obtained: 92},
                {name: "عربی زبان", total: 100, obtained: 96},
                {name: "اردو تحریری", total: 50, obtained: 47}
            ]
        },
        {
            name: "عائشہ بی",
            parent: "شیخ احمد",
            className: "شعبہ ناظرہ قرآن",
            theme: "#006400",
            subjects: [
                {name: "ناظرہ قرآن", total: 100, obtained: 95},
                {name: "عقائد", total: 50, obtained: 48},
                {name: "مسنون دعائیں", total: 50, obtained: 50},
                {name: "اردو", total: 100, obtained: 92}
            ]
        }
    ];
    // =======================================================

    function getGrade(perc) {
        if (perc >= 90) return "A+";
        if (perc >= 75) return "A";
        if (perc >= 60) return "B";
        if (perc >= 35) return "C";
        return "F";
    }

    function generateCards() {
        const container = document.getElementById('cards-container');
        container.innerHTML = '';

        students.forEach(student => {
            let totalMax = 0;
            let obtained = 0;
            let rows = '';

            student.subjects.forEach(sub => {
                totalMax += sub.total;
                obtained += sub.obtained;
                rows += `
                    <tr>
                        <td>${sub.name}</td>
                        <td>${sub.total}</td>
                        <td>${sub.obtained}</td>
                    </tr>`;
            });

            const percentage = totalMax ? ((obtained / totalMax) * 100).toFixed(1) : 0;
            const grade = getGrade(parseFloat(percentage));

            const cardHTML = `
                <div class="page" style="--theme-color: ${student.theme};">
                    <div class="watermark">مکتب فاطمة للبنات</div>
                    
                    <div class="header">
                        <img src="logo.png" alt="لوگو">
                        <h1>مکتب فاطمة للبنات</h1>
                        <div class="address">اندر قلعہ، مقابل مسجد نمرہ، کھمم، تلنگانہ</div>
                        <div class="exam">سالانہ امتحان فروری ۲۰۲۵</div>
                    </div>

                    <div class="student-info">
                        <div><strong>طالبہ کا نام :</strong> ${student.name}</div>
                        <div><strong>${student.className.includes('ناظرہ') ? 'شوہر کا نام' : 'والد کا نام'} :</strong> ${student.parent}</div>
                    </div>
                    <div class="student-info">
                        <div><strong>کورس :</strong> ${student.className}</div>
                        <div><strong>تعلیمی سال :</strong> 2024-2025</div>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>مضمون</th>
                                <th>کل نمبر</th>
                                <th>حاصل کردہ نمبر</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                        <tfoot>
                            <tr class="total-row">
                                <td>کل</td>
                                <td>${totalMax}</td>
                                <td>${obtained}</td>
                            </tr>
                        </tfoot>
                    </table>

                    <div class="result">
                        <div class="result-box">
                            <strong>فیصد نمبر</strong><br>
                            <span style="font-size:2.2rem;">${percentage}%</span><br>
                            <span style="color:${percentage >= 35 ? '#006400' : '#c00'}; font-weight:bold;">
                                ${percentage >= 35 ? '(PASS)' : '(FAIL)'}
                            </span>
                        </div>
                        <div class="result-box">
                            <strong>گریڈ</strong><br>
                            <span style="font-size:2.6rem; color:${student.theme};">${grade}</span>
                        </div>
                    </div>

                    <div class="signatures">
                        <div class="signature">
                            <div class="signature-line"></div>
                            <strong>ناظمہ مکتب</strong>
                        </div>
                        <div class="signature">
                            <div class="signature-line"></div>
                            <strong>صدر مدرسہ</strong>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    }

    function downloadAllPDF() {
        const element = document.getElementById('cards-container');
        html2pdf()
            .from(element)
            .set({
                margin: [5, 5, 5, 5],
                filename: 'مکتب_فاطمة_للبنات_تمام_رپورٹ_کارڈز.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2.5, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            })
            .save();
    }

    // Generate cards on load
    window.onload = generateCards;
</script>
</body>
</html>
