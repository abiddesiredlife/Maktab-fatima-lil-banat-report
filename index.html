<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مَكْتَبُ فَاطِمَةَ لِلْبَنَاتِ</title>
<style>
  body { font-family: 'Jameel Noori Nastaleeq', serif; margin: 40px; }
  .header { text-align: center; }
  .logo { float: left; width: 100px; }
  .watermark {
    position: fixed; top: 40%; left: 20%;
    font-size: 60px; color: rgba(0,0,0,0.1);
    transform: rotate(-30deg);
  }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border: 1px solid #000; padding: 8px; text-align: center; }
  .bold { font-weight: bold; }
  .pagebreak { page-break-after: always; }
</style>
</head>
<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h1>مَكْتَبُ فَاطِمَةَ لِلْبَنَاتِ</h1>
  <p>اندر قلعہ، مقابل مسجد نمرہ، کھمم، تلنگانہ</p>
</div>

<div class="watermark">فاطمة للبنات</div>

<script>
// Student data from your PDFs
const students = [
  {
    name: "قاسم بى زوجم شيخ ثانى صاحب",
    class: "ناظرہ",
    rank: "سوم",
    subjects: [
      {name:"ناظرہ قرآن", max:100, obtained:90},
      {name:"عقائد", max:50, obtained:35},
      {name:"مسنون دعائیں", max:50, obtained:35},
      {name:"اردو", max:100, obtained:60}
    ]
  },
  {
    name: "نسرين زوجم محمد عارف صاحب",
    class: "ناظرہ",
    rank: "دوم",
    subjects: [
      {name:"ناظرہ قرآن", max:100, obtained:95},
      {name:"عقائد", max:50, obtained:50},
      {name:"مسنون دعائیں", max:50, obtained:46},
      {name:"اردو", max:100, obtained:100}
    ]
  },
  {
    name: "زهره فاطمة زوجم شيخ محبوب على صاحب",
    class: "مومنة",
    rank: "اول",
    subjects: [
      {name:"ناظرہ قرآن", max:100, obtained:95},
      {name:"حفظ سورہ", max:100, obtained:90},
      {name:"مسنون دعائیں", max:100, obtained:100},
      {name:"حفظ حدیث", max:100, obtained:100},
      {name:"عقائد", max:10, obtained:10},
      {name:"اردو تقریری", max:50, obtained:50},
      {name:"عقائد اسلام", max:90, obtained:89},
      {name:"مسائل شرعی", max:100, obtained:99},
      {name:"سیرت النبی ﷺ", max:100, obtained:99},
      {name:"اخلاقی تعلیم", max:100, obtained:99},
      {name:"عربی زبان", max:100, obtained:99},
      {name:"اردو تحریری", max:50, obtained:49}
    ]
  }
];

// Function to generate report card
function generateReport(student) {
  let total = 0, obtained = 0;
  let tableRows = "";
  student.subjects.forEach(sub => {
    tableRows += `<tr>
      <td>${sub.name}</td>
      <td>${sub.max}</td>
      <td class="bold">${sub.obtained}</td>
      <td>${sub.obtained >= 35 ? "پاس" : "فیل"}</td>
    </tr>`;
    total += sub.max;
    obtained += sub.obtained;
  });

  let percentage = Math.round((obtained/total)*100);
  let grade = "F";
  if (percentage >= 75) grade = "A";
  else if (percentage >= 60) grade = "B";
  else if (percentage >= 45) grade = "C";
  else if (percentage >= 35) grade = "D";

  document.write(`
    <div class="pagebreak">
      <h2>رپورٹ کارڈ</h2>
      <p>نام طالبہ: ${student.name}</p>
      <p>کلاس: ${student.class}</p>
      <table>
        <tr><th>مضمون</th><th>کل نمبرات</th><th>حاصل نمبرات</th><th>نتیجہ</th></tr>
        ${tableRows}
      </table>
      <p>مجموعی نمبرات: ${obtained} / ${total}</p>
      <p>فیصد: ${percentage}%</p>
      <p>گریڈ: ${grade}</p>
      <p>درجہ: ${student.rank}</p>
      <br><br>
      <p>ناظم مکتب: ____________</p>
      <p>صدر مدرس: ____________</p>
    </div>
  `);
}

// Generate all student reports
students.forEach(s => generateReport(s));
</script>

</body>
</html>
