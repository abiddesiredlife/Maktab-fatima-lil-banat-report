<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مکتب فاطمة للبنات - Final Clean Template</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Noto Nastaliq Urdu', Arial, sans-serif; text-align:center; padding:50px; background:linear-gradient(#f0f8f0, #fff8e1); }
        h1 { color:#006400; font-size:2.8rem; }
        .btn { background:#006400; color:white; padding:20px 70px; font-size:1.6rem; border:none; border-radius:50px; cursor:pointer; margin-top:30px; box-shadow:0 10px 30px rgba(0,100,0,0.4); }
        .btn:hover { background:#004d00; transform:scale(1.05); }
        .note { margin-top:30px; font-size:1.1rem; color:#333; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>مَكْتَبُ فَاطِمَةَ لِلْبَنَاتِ</h1>
    <p style="font-size:1.4rem; color:#006400;">سالانہ امتحان فروری ۲۰۲۵ — Final Clean Template</p>
    
    <div class="note">
        ✅ Dropdown + Auto Fill + Auto Grade + Auto Total<br>
        ✅ All 9 students included<br>
        ✅ No merge errors
    </div>

    <button class="btn" onclick="generateImprovedTemplate()">📥 Download Improved Clean Template</button>

    <script>
        function generateImprovedTemplate() {
            const wb = XLSX.utils.book_new();

            // ==================== DATA SHEET ====================
            const dataRows = [
                ["طالبہ کا نام", "شوہر/والد کا نام", "مجموعہ", "ناظرہ قرآن", "عقائد", "اردو"],
                ["قاسم بی", "شیخ ثانی صاحب", 300, 90, 100, 100],
                ["نسرین", "محمد عارف صاحب", 300, 95, 100, 96],
                ["احمد النساء", "محمد عبد الحلیم صاحب", 300, 95, 88, 98],
                ["عریشہ", "محمد ثقیل صاحب", 300, 100, 98, 98],
                ["سمیہ", "محمد عقیل صاحب", 300, 90, 99, 99],
                ["شاہین", "محمد عبد الرحیم صاحب", 300, 100, 100, 100],
                ["فرحانہ", "محمد غوث صاحب", 300, 99, 100, 100],
                ["رحیم النساء", "شیخ علی صاحب", 300, 97, 47, 96],
                ["نازیہ کوثر", "مرزا عظمت اللہ بیگ صاحب", 300, 90, 100, 98]
            ];

            const wsData = XLSX.utils.aoa_to_sheet(dataRows);
            XLSX.utils.book_append_sheet(wb, wsData, "Data");

            // ==================== MAIN REPORT SHEET ====================
            const reportRows = [
                ["مَكْتَبُ فَاطِمَةَ لِلْبَنَاتِ"],
                ["اندر قلعہ، مقابل مسجد نمرہ، کھمم، تلنگانہ"],
                ["سالانہ امتحان فروری ۲۰۲۵"],
                [],
                ["طالبہ کا نام", "", "شوہر/والد کا نام", ""],
                ["", "", "", ""],
                [],
                ["مضمون", "کل نمبرات", "حاصل نمبرات"],
                ["ناظرہ قرآن", 100, ""],
                ["عقائد", 100, ""],
                ["اردو", 100, ""],
                [],
                ["کل", 300, "=SUM(C9:C11)"],
                ["فیصد", "=ROUND(C12/300*100,1)", ""],
                ["گریڈ", "=IF(C13>=75,\"A\",IF(C13>=60,\"B\",IF(C13>=45,\"C\",IF(C13>=35,\"D\",\"F\"))))", ""],
                ["نتیجہ", "=IF(C13>=35,\"پاس\",\"فیل\")", ""]
            ];

            const wsReport = XLSX.utils.aoa_to_sheet(reportRows);

            // Add dropdown in cell B5 (طالبہ کا نام)
            wsReport['B5'] = { v: "", t: "s" };
            wsReport['!dataValidation'] = {
                'B5': {
                    sqref: 'B5',
                    formula1: 'Data!$A$2:$A$10',
                    type: 'list',
                    allowBlank: true,
                    showDropDown: true
                }
            };

            // Add formulas
            wsReport['D5'] = { f: '=INDEX(Data!$B$2:$B$10, MATCH(B5, Data!$A$2:$A$10, 0))' };   // Husband Name
            wsReport['C9'] = { f: '=INDEX(Data!$D$2:$D$10, MATCH(B5, Data!$A$2:$A$10, 0))' };   // Nazira Quran
            wsReport['C10'] = { f: '=INDEX(Data!$E$2:$E$10, MATCH(B5, Data!$A$2:$A$10, 0))' };  // Aqaid
            wsReport['C11'] = { f: '=INDEX(Data!$F$2:$F$10, MATCH(B5, Data!$A$2:$A$10, 0))' };  // Urdu

            XLSX.utils.book_append_sheet(wb, wsReport, "Report Card");

            // Download
            XLSX.writeFile(wb, "Improved_ReportCards_Template.xlsx");
            alert("✅ Template downloaded successfully!\n\nHow to use:\n1. Open the file\n2. Click on طالبہ کا نام cell\n3. Select any student from dropdown\n4. All data will auto-fill");
        }
    </script>
</body>
</html>
