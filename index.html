<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مکتب فاطمة للبنات - رپورٹ کارڈ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-color: #006400;
            --theme-light: #e6f0e6;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Nastaliq Urdu', serif;
            background: #f8f8f8;
            color: #222;
            direction: rtl;
            text-align: right;
            line-height: 1.45;
        }
        .report-container {
            position: relative;
            background: white;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 18px 28px;
            border: 9px solid var(--theme-color);
            overflow: hidden;
            font-size: 13.5px;
        }
        .report-header {
            text-align: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 4px double var(--theme-color);
        }
        .report-header img {
            width: 65px;
            height: 65px;
            float: left;
            margin-left: 12px;
        }
        .report-header h1 {
            font-family: 'Amiri', serif;
            font-size: 26px;
            color: var(--theme-color);
            margin: 0 0 3px 0;
        }
        .report-header p {
            font-size: 13px;
            margin: 2px 0;
            color: #444;
        }
        .exam-title {
            font-size: 15px;
            font-weight: bold;
            color: #333;
            margin-top: 4px;
        }
        .student-info {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 8px;
            margin: 12px 0;
            font-size: 13.5px;
        }
        .student-info > div {
            flex: 1 1 48%;
            background: #fcfcfc;
            padding: 6px 10px;
            border-radius: 5px;
        }
        .student-info strong {
            color: var(--theme-color);
        }
        .class-name {
            text-align: center;
            font-size: 17px;
            font-weight: bold;
            color: var(--theme-color);
            margin: 10px 0 8px;
            padding: 6px;
            background: var(--theme-light);
            border-radius: 5px;
        }
        .preview-table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 13px;
        }
        .preview-table th, .preview-table td {
            border: 1px solid #555;
            padding: 5px 6px;
            text-align: center;
            line-height: 1.3;
        }
        .preview-table th {
            background: var(--theme-color);
            color: white;
            font-size: 13.5px;
        }
        .preview-table td {
            font-size: 13px;
        }
        .total-row {
            font-weight: bold;
            background: #f4f4f4;
        }
        .result-section {
            display: flex;
            justify-content: space-between;
            margin: 16px 0 20px;
            font-size: 14px;
        }
        .result-section > div {
            flex: 1;
            text-align: center;
            padding: 10px;
            margin: 0 6px;
            border: 2.5px solid var(--theme-color);
            border-radius: 6px;
            background: #f9f9f9;
        }
        .result-section strong {
            display: block;
            margin-bottom: 4px;
        }
        #p-percentage {
            font-size: 24px;
            font-weight: bold;
        }
        #p-grade {
            font-size: 32px;
            font-weight: bold;
            color: var(--theme-color);
        }
        .signatures {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            font-size: 14px;
        }
        .signature {
            text-align: center;
            width: 48%;
        }
        .signature-line {
            border-top: 1.5px solid #333;
            width: 85%;
            margin: 8px auto 4px;
        }
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-35deg);
            font-size: 60px;
            color: rgba(0,100,0,0.05);
            font-weight: bold;
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
        }

        /* Print / PDF optimization */
        @media print {
            body { background: white; margin: 0; }
            .report-container {
                width: 100%;
                height: auto;
                min-height: unset;
                margin: 0;
                padding: 16mm 20mm;
                border: 8mm solid var(--theme-color);
                box-shadow: none;
                page-break-after: avoid;
            }
            .watermark { opacity: 0.04; }
        }
    </style>
</head>
<body>

<div class="report-container" id="report-card">
    <div class="watermark">مکتب فاطمة للبنات</div>

    <div class="report-header">
        <img src="logo.png" alt="لوگو">
        <h1>مکتب فاطمة للبنات</h1>
        <p>اندر قلعہ، مقابل مسجد نمرہ، کھمم، تلنگانہ</p>
        <div class="exam-title">سالانہ امتحان فروری ۲۰۲۵</div>
    </div>

    <div class="student-info">
        <div><strong>طالبہ کا نام :</strong> <span id="p-student-name">—</span></div>
        <div><strong id="p-parent-label">شوہر/والد کا نام :</strong> <span id="p-parent-name">—</span></div>
        <div><strong>تعلیمی سال :</strong> 2024-2025</div>
        <div><strong>کورس :</strong> <span id="p-class-name">—</span></div>
    </div>

    <div class="class-name" id="p-class-display">—</div>

    <table class="preview-table">
        <thead>
            <tr>
                <th>مضمون</th>
                <th>کل نمبر</th>
                <th>حاصل کردہ</th>
            </tr>
        </thead>
        <tbody id="preview-tbody"></tbody>
        <tfoot>
            <tr class="total-row">
                <td>کل</td>
                <td id="p-total-max">—</td>
                <td id="p-total-obtained">0</td>
            </tr>
        </tfoot>
    </table>

    <div class="result-section">
        <div>
            <strong>فیصد</strong>
            <span id="p-percentage">0.0</span> %
            <span id="p-pass-status" style="color:#006400; font-weight:bold;">(PASS)</span>
        </div>
        <div>
            <strong>گریڈ</strong>
            <span id="p-grade">F</span>
        </div>
    </div>

    <div class="signatures">
        <div class="signature">
            <div class="signature-line"></div>
            <strong>ناظمہ مکتب</strong>
        </div>
        <div class="signature">
            <div class="signature-line"></div>
            <strong>صدر مدرسہ</strong>
        </div>
    </div>
</div>

</html>
